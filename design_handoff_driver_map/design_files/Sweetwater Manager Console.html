<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sweetwater's — Dispatch Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; min-height: 100%; }
  * { box-sizing: border-box; }
  body {
    background: #d9d4c8;
    font-family: "Jost", system-ui, sans-serif;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 28px 20px;
  }
  @keyframes mgrspin { to { transform: rotate(360deg); } }
  input::placeholder, textarea::placeholder { color: rgba(26,26,26,0.35); }
  .frame-wrap { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .seg { display: inline-flex; background: #fff; border: 1px solid #e6dfd2; border-radius: 999px; padding: 4px; gap: 2px; }
  .seg button { border: none; background: none; cursor: pointer; font-family: "Jost", sans-serif; font-size: 13px;
    font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; padding: 8px 18px; border-radius: 999px; color: rgba(26,26,26,0.5); }
  .seg button.on { background: #02733e; color: #FAF7F2; }
  .cap { font-family: "Jost", sans-serif; font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; color: rgba(26,26,26,0.4); }
  .device-desktop { width: 1180px; max-width: calc(100vw - 40px); height: 760px; max-height: calc(100vh - 130px);
    border-radius: 16px; overflow: hidden; box-shadow: 0 30px 80px rgba(0,0,0,0.22); border: 1px solid rgba(0,0,0,0.08); background: #FAF7F2; }
  .device-phone { width: 390px; height: 800px; max-height: calc(100vh - 130px); border-radius: 44px; padding: 11px;
    background: #1a1a1a; box-shadow: 0 30px 80px rgba(0,0,0,0.3); }
  .device-phone .screen { width: 100%; height: 100%; border-radius: 33px; overflow: hidden; background: #FAF7F2; position: relative; }
</style>
</head>
<body>
<div id="root"></div>

<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#02733e"/>
    <g fill="none" stroke="#e8b84b" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="34" cy="66" r="7"/><circle cx="66" cy="34" r="7"/>
      <path d="M41 66h14a9 9 0 000-18H45a9 9 0 010-18h14"/>
    </g>
  </svg>
</template>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="app/sw-data.jsx"></script>
<script type="text/babel" src="app/mgr-data.jsx"></script>
<script type="text/babel" src="app/mgr-shell.jsx"></script>
<script type="text/babel" src="app/mgr-dispatch.jsx"></script>
<script type="text/babel" src="app/mgr-customers.jsx"></script>
<script type="text/babel" src="app/mgr-history.jsx"></script>
<script type="text/babel" src="app/mgr-extra.jsx"></script>

<script type="text/babel" data-presets="react">
const { useState } = React;

function Console({ isMobile }) {
  const [tab, setTab] = useState("dispatch");
  const views = {
    dispatch: <MgrDispatch isMobile={isMobile} />,
    customers: <MgrCustomers isMobile={isMobile} />,
    history: <MgrHistory isMobile={isMobile} />,
    live: <MgrLive isMobile={isMobile} />,
    reports: <MgrReports isMobile={isMobile} />,
  };
  return <MgrShell tab={tab} setTab={setTab} isMobile={isMobile}>{views[tab]}</MgrShell>;
}

function App() {
  const [device, setDevice] = useState("desktop");
  const isMobile = device === "phone";
  return (
    <div className="frame-wrap">
      <div className="seg">
        <button className={device === "desktop" ? "on" : ""} onClick={() => setDevice("desktop")}>Desktop</button>
        <button className={device === "phone" ? "on" : ""} onClick={() => setDevice("phone")}>Phone</button>
      </div>
      {isMobile ? (
        <div className="device-phone"><div className="screen"><Console isMobile={true} /></div></div>
      ) : (
        <div className="device-desktop"><Console isMobile={false} /></div>
      )}
      <div className="cap">Sweetwater's · Dispatch Console — Manager view</div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
