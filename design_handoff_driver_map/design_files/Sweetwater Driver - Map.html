<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sweetwater's — Driver (Map-First)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; min-height: 100%; }
  * { box-sizing: border-box; }
  body {
    background:
      radial-gradient(1200px 800px at 70% -10%, #f3efe7 0%, rgba(243,239,231,0) 60%),
      #e6e1d7;
    font-family: "Jost", system-ui, sans-serif;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 28px;
  }
  .stage { display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .stage-cap { font-family: "Jost", sans-serif; font-size: 12px; letter-spacing: 0.22em;
    text-transform: uppercase; color: rgba(26,26,26,0.4); }
  button { font-family: inherit; }
</style>
</head>
<body>
<div id="root"></div>

<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#02733e"/>
    <path d="M50 28a14 14 0 00-14 14c0 10 14 24 14 24s14-14 14-24a14 14 0 00-14-14z" fill="#e8b84b"/>
    <circle cx="50" cy="42" r="5" fill="#02733e"/>
  </svg>
</template>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="app/sw-data.jsx"></script>
<script type="text/babel" src="app/driver-clean.jsx"></script>
<script type="text/babel" src="app/driver-map.jsx"></script>

<script type="text/babel" data-presets="react">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "arrive": "slide",
  "photoRequired": true,
  "accent": "#02733e",
  "mapLabels": true
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  return (
    <div className="stage">
      <DriverMap cfg={t} />
      <div className="stage-cap">Sweetwater's · Driver — Map-First</div>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Behavior" />
        <TweakToggle label="Photo required to complete" value={t.photoRequired}
          onChange={(v) => setTweak("photoRequired", v)} />

        <TweakSection label="Look" />
        <TweakColor label="Accent" value={t.accent}
          options={["#02733e", "#0c6b5f", "#1f4d2e"]}
          onChange={(v) => setTweak("accent", v)} />
        <TweakToggle label="Street labels on map" value={t.mapLabels}
          onChange={(v) => setTweak("mapLabels", v)} />
      </TweaksPanel>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
